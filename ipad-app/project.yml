name: EigoLens
options:
  bundleIdPrefix: com.jworks.eigolens
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2"  # iPad only

configs:
  Debug: debug
  Release: release

targets:
  EigoLens:
    type: application
    platform: iOS
    configFiles:
      Debug: EigoLens.xcconfig
      Release: EigoLens.xcconfig

    sources:
      - path: EigoLens
        excludes:
          - "**/.DS_Store"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jworks.eigolens
        INFOPLIST_FILE: EigoLens/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"  # iPad only
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule

    dependencies:
      - sdk: libsqlite3.tbd

    preBuildScripts:
      - name: "Stage WordNet Database"
        script: |
          # Copy WordNet database from Android project if not present
          DB_DEST="${PROJECT_DIR}/EigoLens/Resources/wordnet.db"
          DB_SRC="${PROJECT_DIR}/../app/src/main/assets/wordnet.db"
          if [ ! -f "$DB_DEST" ] && [ -f "$DB_SRC" ]; then
            cp "$DB_SRC" "$DB_DEST"
          fi
        basedOnDependencyAnalysis: false

  EigoLensTests:
    type: bundle.unit-test
    platform: iOS

    sources:
      - path: EigoLensTests

    dependencies:
      - target: EigoLens

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jworks.eigolens.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/EigoLens.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/EigoLens"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  EigoLens:
    build:
      targets:
        EigoLens: all
        EigoLensTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EigoLensTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
